name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install

      # Unsigned build for the iOS Simulator only — proves the app compiles
      # and runs, but Simulator builds can't be installed on a real iPhone.
      # Apple requires code signing for any real-device install, with no
      # exception — that always means a paid Apple Developer Program
      # membership ($99/yr), regardless of who or where it's built.
      - name: Build for iOS Simulator (smoke test)
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug build

      # Signed IPA: only runs once you have an Apple Developer Program
      # membership and add these secrets in
      # Settings → Secrets and variables → Actions:
      #   IOS_DIST_CERT_BASE64        (base64 of your .p12 distribution cert)
      #   IOS_DIST_CERT_PASSWORD
      #   IOS_PROVISION_PROFILE_BASE64 (base64 of your .mobileprovision)
      #   IOS_TEAM_ID
      - name: Import signing certificate & provisioning profile
        id: signing
        if: ${{ env.IOS_DIST_CERT_BASE64 != '' }}
        env:
          IOS_DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain

          echo "$IOS_DIST_CERT_BASE64" | base64 -d > cert.p12
          security import cert.p12 -k build.keychain -P "$IOS_DIST_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Archive and export signed IPA
        if: steps.signing.outputs.present == 'true'
        working-directory: ios/App
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -archivePath build/App.xcarchive archive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID"
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>$IOS_TEAM_ID</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive -archivePath build/App.xcarchive \
            -exportPath build/ipa -exportOptionsPlist ExportOptions.plist

      - name: Upload signed IPA
        if: steps.signing.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: acplrwa-mis-ipa
          path: ios/App/build/ipa/*.ipa
